<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; width: 280px; padding: 15px; background: #15202b; color: white; }
        h2 { font-size: 16px; margin-top: 0; }
        .toggle-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; font-size: 14px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #38444d; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #1d9bf0; }
        input:checked + .slider:before { transform: translateX(14px); }
        input[type="text"] { width: calc(100% - 60px); padding: 5px; border-radius: 4px; border: 1px solid #38444d; background: #22303c; color: white; outline: none; }
        button { background: #1d9bf0; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1a8cd8; }
        ul { list-style-type: none; padding: 0; margin-top: 15px; }
        li { display: flex; justify-content: space-between; background: #22303c; padding: 8px; margin-bottom: 5px; border-radius: 4px; font-size: 14px; }
        .delete-btn { background: #f4212e; padding: 2px 6px; font-size: 12px; }
        .delete-btn:hover { background: #df1b28; }
    </style>
</head>
<body>
    <h2>X Badge Blocker</h2>
    
    <div class="toggle-container">
        <label class="switch">
            <input type="checkbox" id="toggleExtension">
            <span class="slider"></span>
        </label>
        <span>Blocker Active</span>
    </div>

    <div>
        <input type="text" id="profileInput" placeholder="Profile (e.g. kick)">
        <button id="addButton">Add</button>
    </div>

    <ul id="profileList"></ul>

    <script src="config.js"></script>
</body>
</html>
